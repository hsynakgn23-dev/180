<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1024px; height: 1024px; overflow: hidden;
    background: #111008;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .outer {
    width: 860px;
    background: #1a1710;
    border-radius: 36px;
    border: 1.5px solid #2e2a1e;
    padding: 72px 80px 68px;
    display: flex; flex-direction: column; align-items: flex-start; gap: 0;
  }
  .eyebrow {
    font-size: 22px; font-weight: 700; letter-spacing: 3px;
    color: #6b6347; text-transform: uppercase; margin-bottom: 24px;
  }
  .plan-name {
    font-size: 96px; font-weight: 900; color: #f0e8d0;
    letter-spacing: -3px; line-height: 1; margin-bottom: 20px;
  }
  .plan-sub {
    font-size: 34px; color: #7a7055; font-weight: 400; margin-bottom: 56px;
  }
  .divider {
    width: 100%; height: 1.5px; background: #2a2618; margin: 0 0 48px;
  }
  .features { display: flex; flex-direction: column; gap: 26px; width: 100%; }
  .feature {
    display: flex; align-items: center; gap: 20px;
    font-size: 32px; color: #c8bc9a; font-weight: 500;
  }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #8a8060; flex-shrink: 0;
  }
  .cta {
    margin-top: 56px; width: 100%;
    background: #8a9a5a;
    border-radius: 22px; padding: 30px;
    text-align: center;
    font-size: 36px; font-weight: 800; color: #1a1e0a;
  }
  .app-name {
    margin-top: 32px; font-size: 22px; color: #4a4530;
    text-align: center; width: 100%; letter-spacing: 1px;
    text-transform: uppercase; font-weight: 500;
  }
</style>
</head>
<body>
  <div class="outer">
    <div class="eyebrow">Premium Plan</div>
    <div class="plan-name">Aylık</div>
    <div class="plan-sub">Esnek başlangıç</div>
    <div class="divider"></div>
    <div class="features">
      <div class="feature"><div class="dot"></div>Reklamsız deneyim</div>
      <div class="feature"><div class="dot"></div>Limitsiz günlük quiz</div>
      <div class="feature"><div class="dot"></div>İstediğin zaman çık</div>
    </div>
    <div class="cta">Aylık Abonelik</div>
    <div class="app-name">180 Absolute Cinema</div>
  </div>
</body>
</html>
