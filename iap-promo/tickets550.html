<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1024px; height: 1024px; overflow: hidden;
    background: #111008;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .outer {
    width: 860px;
    background: #101820;
    border-radius: 36px;
    border: 1.5px solid #4070b0;
    padding: 72px 80px 68px;
    display: flex; flex-direction: column; align-items: flex-start; gap: 0;
    position: relative;
  }
  .badge {
    position: absolute; top: -24px; left: 80px;
    background: #4070b0;
    border-radius: 100px; padding: 12px 32px;
    font-size: 22px; font-weight: 800; color: #fff;
    letter-spacing: 1px;
  }
  .eyebrow {
    font-size: 22px; font-weight: 700; letter-spacing: 3px;
    color: #4060a0; text-transform: uppercase; margin-bottom: 24px;
  }
  .amount {
    font-size: 140px; font-weight: 900; color: #d0e8ff;
    letter-spacing: -4px; line-height: 1; margin-bottom: 0;
  }
  .unit {
    font-size: 52px; font-weight: 700; color: #6090d0;
    margin-bottom: 48px; margin-top: 8px;
  }
  .divider {
    width: 100%; height: 1.5px; background: #1a2840; margin: 0 0 48px;
  }
  .desc {
    font-size: 32px; color: #8ab0d8; line-height: 1.6; font-weight: 500;
  }
  .cta {
    margin-top: 56px; width: 100%;
    background: #8a9a5a;
    border-radius: 22px; padding: 30px;
    text-align: center;
    font-size: 36px; font-weight: 800; color: #1a1e0a;
  }
  .app-name {
    margin-top: 32px; font-size: 22px; color: #304858;
    text-align: center; width: 100%; letter-spacing: 1px;
    text-transform: uppercase; font-weight: 500;
  }
</style>
</head>
<body>
  <div class="outer">
    <div class="badge">POPÜLER</div>
    <div class="eyebrow">Bilet Paketi</div>
    <div class="amount">550</div>
    <div class="unit">Bilet</div>
    <div class="divider"></div>
    <div class="desc">Quiz oyna, streak koru,<br>ödül kazan.</div>
    <div class="cta">550 Bilet Al</div>
    <div class="app-name">180 Absolute Cinema</div>
  </div>
</body>
</html>
