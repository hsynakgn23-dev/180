<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1024px; height: 1024px; overflow: hidden;
    background: #111008;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .outer {
    width: 860px;
    background: #1a1710;
    border-radius: 36px;
    border: 1.5px solid #2e2a1e;
    padding: 72px 80px 68px;
    display: flex; flex-direction: column; align-items: flex-start; gap: 0;
  }
  .badge {
    background: #3a3628;
    border-radius: 100px; padding: 12px 30px;
    font-size: 22px; font-weight: 700; color: #9a9070;
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 36px;
  }
  .plan-name {
    font-size: 96px; font-weight: 900; color: #f0e8d0;
    letter-spacing: -3px; line-height: 1; margin-bottom: 20px;
  }
  .plan-sub {
    font-size: 34px; color: #7a7055; font-weight: 400; margin-bottom: 56px;
  }
  .divider {
    width: 100%; height: 1.5px; background: #2a2618; margin: 0 0 48px;
  }
  .message {
    font-size: 32px; color: #a09870; line-height: 1.7;
    font-weight: 500;
  }
  .cta {
    margin-top: 56px; width: 100%;
    background: #8a9a5a;
    border-radius: 22px; padding: 30px;
    text-align: center;
    font-size: 36px; font-weight: 800; color: #1a1e0a;
  }
  .app-name {
    margin-top: 32px; font-size: 22px; color: #4a4530;
    text-align: center; width: 100%; letter-spacing: 1px;
    text-transform: uppercase; font-weight: 500;
  }
</style>
</head>
<body>
  <div class="outer">
    <div class="badge">DESTEK</div>
    <div class="plan-name">Destekçi</div>
    <div class="plan-sub">Topluluğa katkı</div>
    <div class="divider"></div>
    <div class="message">
      Projeyi doğrudan destekle.<br>
      Abonelik gerektirmez.
    </div>
    <div class="cta">Destekçi Paketi</div>
    <div class="app-name">180 Absolute Cinema</div>
  </div>
</body>
</html>
