<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>180 Absolute Cinema | Returning to App</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #121212;
      color: #e5e4e2;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(138, 154, 91, 0.18), transparent 42%),
        linear-gradient(180deg, #171717 0%, #121212 100%);
    }

    main {
      width: min(92vw, 460px);
      padding: 32px 24px;
      border: 1px solid rgba(229, 228, 226, 0.08);
      border-radius: 24px;
      background: rgba(17, 17, 17, 0.88);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.34);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
      line-height: 1.1;
    }

    p {
      margin: 0 0 18px;
      color: rgba(229, 228, 226, 0.76);
      line-height: 1.55;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      color: #121212;
      background: #8a9a5b;
      text-decoration: none;
      font-weight: 700;
    }

    .meta {
      margin-top: 16px;
      font-size: 12px;
      color: rgba(229, 228, 226, 0.52);
    }
  </style>
</head>
<body>
  <main>
    <h1>Returning to 180 Absolute Cinema</h1>
    <p>If the app does not open automatically, use the button below to continue inside the mobile app.</p>
    <a id="open-app" href="absolutecinema://open">Open the app</a>
    <div class="meta">This bridge keeps OAuth and password recovery callbacks inside the native app.</div>
  </main>

  <script>
    (() => {
      const url = new URL(window.location.href);
      const appRedirect = String(url.searchParams.get('app_redirect') || 'absolutecinema://open').trim();
      url.searchParams.delete('app_redirect');

      const redirectTarget = new URL(appRedirect);
      for (const [key, value] of url.searchParams.entries()) {
        redirectTarget.searchParams.set(key, value);
      }

      const hash = String(window.location.hash || '').trim();
      if (hash) {
        redirectTarget.hash = hash.replace(/^#/, '');
      }

      const targetHref = redirectTarget.toString();
      const button = document.getElementById('open-app');
      if (button) {
        button.setAttribute('href', targetHref);
      }

      window.location.replace(targetHref);
    })();
  </script>
</body>
</html>
