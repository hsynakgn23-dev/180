name: mobile-phase1-release-gate

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "api/**"
      - "src/**"
      - "server/**"
      - "packages/shared/src/mobile/**"
      - "scripts/mobile-*.mjs"
      - "package.json"
      - "package-lock.json"
      - "eslint.config.js"
      - "README.md"
      - ".github/workflows/mobile-phase1-qa.yml"
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "api/**"
      - "src/**"
      - "server/**"
      - "packages/shared/src/mobile/**"
      - "scripts/mobile-*.mjs"
      - "package.json"
      - "package-lock.json"
      - "eslint.config.js"
      - "README.md"
      - ".github/workflows/mobile-phase1-qa.yml"

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            apps/mobile/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install mobile dependencies
        run: npm --prefix apps/mobile ci

      - name: Prepare CI env
        shell: bash
        run: |
          cat > .env <<'EOF'
          VITE_SUPABASE_URL=https://example.supabase.co
          VITE_SUPABASE_ANON_KEY=ci_dummy_anon_key
          SUPABASE_SERVICE_ROLE_KEY=ci_dummy_service_role_key
          EOF

      - name: Materialize Android Firebase config for release gate
        shell: bash
        env:
          MOBILE_GOOGLE_SERVICES_JSON_B64: ${{ secrets.MOBILE_GOOGLE_SERVICES_JSON_B64 }}
        run: |
          if [ -z "$MOBILE_GOOGLE_SERVICES_JSON_B64" ]; then
            echo "::warning::Missing GitHub secret MOBILE_GOOGLE_SERVICES_JSON_B64. Falling back to no-push release gate."
            printf '\nMOBILE_RELEASE_PUSH_ENABLED=0\n' >> .env
            echo "MOBILE_RELEASE_ALLOW_NO_PUSH=1" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "MOBILE_RELEASE_ALLOW_NO_PUSH=0" >> "$GITHUB_ENV"
          python3 - <<'PY'
          import base64
          import json
          import os
          import sys

          secret_value = os.environ.get("MOBILE_GOOGLE_SERVICES_JSON_B64", "").strip()

          if secret_value.startswith("{"):
              file_text = secret_value
          else:
              normalized = "".join(secret_value.split())
              try:
                  file_text = base64.b64decode(normalized, validate=True).decode("utf-8")
              except Exception as error:
                  print("::error::MOBILE_GOOGLE_SERVICES_JSON_B64 is not valid base64.", flush=True)
                  print(
                      "::error::Paste either the raw google-services.json content or its base64 value into the GitHub secret.",
                      flush=True,
                  )
                  print(f"::error::{error}", flush=True)
                  sys.exit(1)

          try:
              json.loads(file_text)
          except Exception as error:
              print("::error::Decoded Firebase config is not valid JSON.", flush=True)
              print(f"::error::{error}", flush=True)
              sys.exit(1)

          with open("apps/mobile/google-services.json", "w", encoding="utf-8", newline="\n") as handle:
              handle.write(file_text)
              if not file_text.endswith("\n"):
                  handle.write("\n")
          PY
          if [ ! -s apps/mobile/google-services.json ]; then
            echo "::error::apps/mobile/google-services.json was generated empty."
            exit 1
          fi

      - name: Run mobile phase-1 release strict gate
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/mobile-release
          cat > artifacts/mobile-release/ci-step-status.txt <<'EOF'
          mobile:phase1:qa=NOT_RUN
          mobile:release:env:sync=NOT_RUN
          mobile-release-ready=NOT_RUN
          EOF
          cat > artifacts/mobile-release/release-ready-report.json <<'EOF'
          {
            "generatedAt": "pending",
            "status": "NOT_RUN",
            "strict": true,
            "envFile": "apps/mobile/.env.release",
            "warningCount": 0,
            "checks": [],
            "warnings": [
              "release gate did not finish; inspect ci-step-status.txt and workflow logs"
            ]
          }
          EOF
          cat > artifacts/mobile-release/release-checklist.md <<'EOF'
          # Mobile Release Checklist

          - Status: NOT_RUN
          - Detail: Release gate did not finish; inspect `ci-step-status.txt` and workflow logs.
          EOF

          qa_status=0
          release_env_status=0
          ready_status=0

          npm run mobile:phase1:qa
          qa_status=$?
          npm run mobile:release:env:sync
          release_env_status=$?
          node scripts/mobile-release-ready.mjs \
            --env-file=apps/mobile/.env.release \
            --strict \
            --report-file=artifacts/mobile-release/release-ready-report.json \
            --checklist-file=artifacts/mobile-release/release-checklist.md
          ready_status=$?

          cat > artifacts/mobile-release/ci-step-status.txt <<EOF
          mobile:phase1:qa=$qa_status
          mobile:release:env:sync=$release_env_status
          mobile-release-ready=$ready_status
          EOF

          if [ "$qa_status" -ne 0 ]; then
            echo "::error::mobile:phase1:qa failed with exit code $qa_status."
          fi

          if [ "$release_env_status" -ne 0 ]; then
            echo "::error::mobile:release:env:sync failed with exit code $release_env_status."
          fi

          if [ "$ready_status" -ne 0 ]; then
            echo "::error::mobile-release-ready failed with exit code $ready_status."
          fi

          if [ "$qa_status" -ne 0 ] || [ "$release_env_status" -ne 0 ] || [ "$ready_status" -ne 0 ]; then
            exit 1
          fi

      - name: Upload mobile release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-phase1-release-gate-${{ github.run_number }}
          path: |
            artifacts/mobile-release/**
            apps/mobile/.env.release
          if-no-files-found: warn
